[package]
name = "passport_adapter"
type = "bin"
authors = ["kidneyweakx"]
description = "OpenAC passport adapter: RSA-2048 verification + DG hash chain + Pedersen commitment"

[dependencies]
openac_core = { path = "../openac_core" }
noir_rsa = { tag = "v0.10.0", git = "https://github.com/zkpassport/noir_rsa" }
bignum = { tag = "v0.9.2", git = "https://github.com/noir-lang/noir-bignum" }
sha256 = { tag = "v0.3.0", git = "https://github.com/noir-lang/sha256" }
