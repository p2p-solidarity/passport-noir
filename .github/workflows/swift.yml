name: Test iOS Swift Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-ios-package:
    # Skip the version-bump commit produced by `scripts/release.sh`. That
    # commit pins Package.swift to a release URL (e.g. v0.2.1) which the
    # tag-driven `release.yml` workflow has not finished publishing yet, so
    # SwiftPM resolution 404s on the xcframework zip. The next regular push
    # (or `gh workflow run`) re-tests against the now-published xcframework.
    if: "!startsWith(github.event.head_commit.message, 'chore: bump Package.swift to v')"
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pick Available iPhone Simulator
        id: sim
        shell: bash
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | grep "iPhone" | head -n 1 | sed -E 's/.*\(([A-F0-9-]+)\) \((Shutdown|Booted)\).*/\1/')
          if [ -z "$DEVICE_ID" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Build and Test Swift Package
        run: |
          xcodebuild test \
            -scheme OpenPassportSwift \
            -destination "id=${{ steps.sim.outputs.device_id }}"
