name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NARGO_VERSION: "1.0.0-beta.19"
  NARGO_MOPRO_VERSION: "1.0.0-beta.8"

jobs:
  # ── Stage 1: Format + Lint (gate for all other jobs) ────
  lint:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nargo
        uses: noir-lang/noirup@v0.1.4
        with:
          toolchain: ${{ env.NARGO_VERSION }}

      - name: Check formatting
        working-directory: circuits
        run: nargo fmt --check --workspace

      - name: Compile (required for gate efficiency scoring)
        working-directory: circuits
        run: nargo compile --workspace

      - name: Run circuit quality lint (9 dimensions)
        run: bash benchmark/scripts/circuit-lint.sh .

      - name: Run size analysis
        run: bash benchmark/scripts/size-bench.sh .

  # ── Stage 2: Build & test circuits ──────────────────────
  noir-circuits:
    name: Noir Circuit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Nargo
        uses: noir-lang/noirup@v0.1.4
        with:
          toolchain: ${{ env.NARGO_VERSION }}

      - name: Compile workspace
        working-directory: circuits
        run: nargo compile --workspace

      - name: Run tests
        working-directory: circuits
        run: nargo test --workspace

      - name: Upload circuit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: circuit-artifacts
          path: circuits/target/*.json
          retention-days: 3

  # ── Stage 3: Spec & cross-circuit checks ────────────────
  spec-check:
    name: Spec & Cross-Circuit Verification
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Nargo
        uses: noir-lang/noirup@v0.1.4
        with:
          toolchain: ${{ env.NARGO_VERSION }}

      - name: Compile (needed for spec checks)
        working-directory: circuits
        run: nargo compile --workspace

      - name: TDD coverage check
        run: bash benchmark/scripts/tdd-check.sh .

      - name: Spec compliance check
        run: bash benchmark/scripts/spec-check.sh .

      - name: Cross-circuit hash chain
        run: bash benchmark/scripts/cross-circuit-check.sh .

      - name: Cross-layer check
        run: bash benchmark/scripts/cross-layer-check.sh .

  # ── Stage 4: Mopro Rust binding ─────────────────────────
  mopro-binding:
    name: Mopro Rust Binding
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mopro-binding/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('mopro-binding/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        working-directory: mopro-binding
        # See release.yml comment: `protoc-prebuilt` build script in `acir` needs
        # an authenticated GitHub API token to avoid anonymous rate limits.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo build

      - name: Run tests
        working-directory: mopro-binding
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo test -- --nocapture

  # ── Stage 5: Integration (circuits + mopro) ─────────────
  integration:
    name: Integration (Compile + Prove)
    runs-on: ubuntu-latest
    needs: [noir-circuits, mopro-binding]
    steps:
      - uses: actions/checkout@v4

      - name: Install Nargo (mopro-compatible)
        uses: noir-lang/noirup@v0.1.4
        with:
          toolchain: ${{ env.NARGO_MOPRO_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mopro-binding/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('mopro-binding/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Compile disclosure circuit (integration artifact)
        working-directory: circuits/disclosure
        run: nargo compile

      - name: Copy circuit artifacts to mopro test-vectors
        run: |
          mkdir -p mopro-binding/test-vectors/noir
          cp circuits/target/disclosure.json mopro-binding/test-vectors/noir/

      - name: Run integration tests (with circuit artifacts)
        working-directory: mopro-binding
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo test -- --ignored --nocapture --test-threads=1
        timeout-minutes: 30
