# Benchmark Spec Definition
# Machine-readable specification for all Noir circuits in this workspace.
# Used by benchmark scripts to verify CLAUDE.md compliance.

[meta]
nargo_version_prefix = "1.0.0-beta"
workspace_members = [
  "passport_verifier",
  "data_integrity",
  "disclosure",
  "prepare_link",
  "show_link",
  "openac_core",
  "passport_adapter",
  "openac_show",
  "device_binding",
  "sdjwt_adapter",
  "jwt_x5c_adapter",
  "x509_show",
  "composite_show",
]

# ============================================================
# Architecture Versions
# ============================================================
# v1: SHA256-based commitments (prepare_link, show_link)
# v2: Pedersen-based commitments, arity 4 (legacy openac_core API — deprecated 2026-04-17)
# v3: Pedersen-based commitments, arity 5 (+ pk_digest) — Path A target
#     Affected: openac_core::commit_attributes_v3, passport_adapter, openac_show,
#     sdjwt_adapter, jwt_x5c_adapter, x509_show, composite_show

[versions]
v1_circuits = ["passport_verifier", "data_integrity", "disclosure", "prepare_link", "show_link"]
v2_circuits = ["device_binding"]
v3_circuits = [
  "openac_core",
  "passport_adapter",
  "openac_show",
  "sdjwt_adapter",
  "jwt_x5c_adapter",
  "x509_show",
  "composite_show",
]

# ============================================================
# Circuit: passport_verifier
# ============================================================
[circuits.passport_verifier]
type = "bin"
description = "RSA-2048 + SHA-256 (PKCS#1 v1.5) signature verification on passport SOD"
source = "circuits/passport_verifier/src/main.nr"

public_inputs = ["modulus_limbs"]
public_input_types = ["[u128; 18]"]

private_inputs = ["sod_hash", "signature_limbs", "redc_limbs", "exponent"]
private_input_types = ["[u8; 32]", "[u128; 18]", "[u128; 18]", "u32"]

assertions = [
  "Passport DSC signature verification failed",
]

min_positive_tests = 1
min_negative_tests = 1

# Outputs consumed by other circuits
exports = { sod_hash = "[u8; 32]" }

[circuits.passport_verifier.dependencies]
noir_rsa = "v0.10.0"
bignum = "v0.9.2"

# ============================================================
# Circuit: data_integrity
# ============================================================
[circuits.data_integrity]
type = "bin"
description = "DG hash chain verification (DG1-DG4 -> SOD hash)"
source = "circuits/data_integrity/src/main.nr"

public_inputs = ["expected_dg_hashes", "sod_hash"]
public_input_types = ["[[u8; 32]; 4]", "[u8; 32]"]

private_inputs = ["dg_count", "dg_contents", "dg_lengths"]
private_input_types = ["u8", "[[u8; 512]; 4]", "[u32; 4]"]

assertions = [
  "Too many data groups",
  "Must have at least one data group",
  "DG length exceeds maximum",
  "Data group hash mismatch",
  "SOD combined hash mismatch",
]

constants = { MAX_DG_COUNT = 4, MAX_DG_SIZE = 512 }

min_positive_tests = 5
min_negative_tests = 3

exports = { sod_hash = "[u8; 32]", mrz_hash = "[u8; 32]" }

[circuits.data_integrity.dependencies]
sha256 = "v0.3.0"

# ============================================================
# Circuit: disclosure
# ============================================================
[circuits.disclosure]
type = "bin"
description = "Selective disclosure over TD3 MRZ (nationality, age, name)"
source = "circuits/disclosure/src/main.nr"

public_inputs = [
  "mrz_hash", "disclose_nationality", "disclose_older_than", "disclose_name",
  "age_threshold", "current_date", "out_nationality", "out_name", "out_is_older",
]
public_input_types = [
  "[u8; 32]", "bool", "bool", "bool",
  "u8", "[u8; 6]", "[u8; 3]", "[u8; 39]", "bool",
]

private_inputs = ["mrz_data"]
private_input_types = ["[u8; 88]"]

assertions = [
  "MRZ hash mismatch",
]

constants = { MRZ_LINE_LEN = 44, MRZ_TOTAL_LEN = 88 }

# MRZ field offsets (absolute byte positions in 88-byte TD3 MRZ)
[circuits.disclosure.mrz_offsets]
nationality = { start = 54, end = 57, length = 3 }
dob = { start = 57, end = 63, length = 6, format = "YYMMDD" }
name = { start = 5, end = 44, length = 39 }

min_positive_tests = 8
min_negative_tests = 3

imports = { mrz_hash = "data_integrity" }

[circuits.disclosure.dependencies]
sha256 = "v0.3.0"

# ============================================================
# Circuit: prepare_link (v1 — SHA256 commitment)
# ============================================================
[circuits.prepare_link]
type = "bin"
description = "OpenAC prepare-phase SHA256 commitment (offline, per session)"
source = "circuits/prepare_link/src/main.nr"
version = "v1"

public_inputs = ["out_prepare_commitment"]
public_input_types = ["[u8; 32]"]

private_inputs = ["sod_hash", "mrz_hash", "link_rand"]
private_input_types = ["[u8; 32]", "[u8; 32]", "[u8; 32]"]

domain_separator = "openac.preparev1"
domain_separator_bytes = 16
commitment_formula = "SHA256(domain || sod_hash || mrz_hash || link_rand)"
preimage_length = 112  # 16 + 32 + 32 + 32

assertions = [
  "Prepare commitment mismatch",
]

min_positive_tests = 2
min_negative_tests = 1

imports = { sod_hash = "passport_verifier", mrz_hash = "data_integrity" }
exports = { out_prepare_commitment = "[u8; 32]" }

[circuits.prepare_link.dependencies]
sha256 = "v0.3.0"

# ============================================================
# Circuit: show_link (v1 — SHA256 challenge + scoped linking)
# ============================================================
[circuits.show_link]
type = "bin"
description = "OpenAC show-phase challenge binding + scoped linking (online, per presentation)"
source = "circuits/show_link/src/main.nr"
version = "v1"

public_inputs = [
  "link_mode", "link_scope", "epoch",
  "out_prepare_commitment", "out_challenge_digest", "out_link_tag",
]
public_input_types = [
  "bool", "[u8; 32]", "[u8; 4]",
  "[u8; 32]", "[u8; 32]", "[u8; 32]",
]

private_inputs = ["sod_hash", "mrz_hash", "link_rand", "challenge"]
private_input_types = ["[u8; 32]", "[u8; 32]", "[u8; 32]", "[u8; 32]"]

domain_separators = [
  { name = "prepare", value = "openac.preparev1", bytes = 16 },
  { name = "show", value = "openac.show.v1", bytes = 14 },
  { name = "scope", value = "openac.scope.v1", bytes = 15 },
]

assertions = [
  "Prepare commitment mismatch",
  "Challenge digest mismatch",
  "Scoped link tag mismatch",
  "Unlinkable mode requires zero scope",
  "Unlinkable mode requires zero tag",
]

min_positive_tests = 3
min_negative_tests = 1

imports = { out_prepare_commitment = "prepare_link", sod_hash = "passport_verifier", mrz_hash = "data_integrity" }

[circuits.show_link.dependencies]
sha256 = "v0.3.0"

# ============================================================
# Library: openac_core (v2 — Pedersen commitment)
# ============================================================
[circuits.openac_core]
type = "lib"
description = "Generic OpenAC building blocks: Pedersen commitment, show logic, predicates"
version = "v2"

modules = ["commit", "show", "predicate"]

[circuits.openac_core.module_commit]
source = "circuits/openac_core/src/commit.nr"
functions = ["commit_attributes", "commit_attributes_extended", "assert_commitment_eq"]
domain_constants = { DOMAIN_PASSPORT = "0x01", DOMAIN_SDJWT = "0x02", DOMAIN_MDL = "0x03" }
assertions = ["Commitment X mismatch", "Commitment Y mismatch"]
min_positive_tests = 4
min_negative_tests = 1

[circuits.openac_core.module_show]
source = "circuits/openac_core/src/show.nr"
functions = ["compute_challenge_digest", "compute_link_tag", "assert_hash_eq", "verify_show"]
domain_separators = [
  { name = "show", value = "openac.show.v2", bytes = 14 },
  { name = "scope", value = "openac.scope.v2", bytes = 15 },
]
# challenge_digest = SHA256("openac.show.v2" || commitment_x(32) || commitment_y(32) || challenge(32) || epoch(4))
# link_tag = pedersen_hash([commitment_x, commitment_y, link_scope, epoch_field])
assertions = ["Hash mismatch", "Scoped link tag mismatch", "Unlinkable mode requires zero scope", "Unlinkable mode requires zero tag"]
min_positive_tests = 4
min_negative_tests = 1

[circuits.openac_core.module_predicate]
source = "circuits/openac_core/src/predicate.nr"
functions = ["check_age_above", "check_bytes3_eq", "two_digit_year_to_four"]
min_positive_tests = 4
min_negative_tests = 0

# ============================================================
# Circuit: passport_adapter (v3.1 — Path A combined prepare with CSCA chain)
# ============================================================
[circuits.passport_adapter]
type = "bin"
description = "Combined passport prepare (v3.1): DSC->SOD RSA verify + CSCA->DSC RSA chain + depth-8 Master List Merkle inclusion + depth-32 DSC revocation SMT + DG hash chain + Pedersen v3 commitment bound to enclave pk_digest"
source = "circuits/passport_adapter/src/main.nr"
version = "v3.1"

gate_budget = 50000  # v3.1 measured 36,223 opcodes; ~28% headroom

# v3.1 promotes the trust anchor model: `csca_root` (ICAO Master List snapshot)
# and `dsc_smt_root` (DSC revocation list) are the only non-commitment public
# inputs. The DSC RSA modulus is now a private witness because CSCA + Merkle
# inclusion proves its legitimacy.
public_inputs = [
  "csca_root", "dsc_smt_root",
  "out_commitment_x", "out_commitment_y",
]
public_input_types = ["Field", "Field", "Field", "Field"]

private_inputs = [
  "sod_hash", "signature_limbs", "modulus_limbs", "redc_limbs", "exponent",
  "csca_modulus_limbs", "csca_redc_limbs",
  "dsc_tbs", "dsc_cert_sig_limbs",
  "csca_merkle_index", "csca_merkle_siblings",
  "dsc_serial", "smt_siblings", "smt_old_key", "smt_old_value", "smt_is_old0",
  "dg_count", "dg_contents", "dg_lengths", "expected_dg_hashes",
  "link_rand",
  "enclave_pk_x", "enclave_pk_y",
]
private_input_types = [
  "[u8; 32]", "[u128; 18]", "[u128; 18]", "[u128; 18]", "u32",
  "[u128; 18]", "[u128; 18]",
  "[u8; 1536]", "[u128; 18]",
  "u32", "[Field; 8]",
  "[u8; 20]", "[Field; 32]", "Field", "Field", "bool",
  "u8", "[[u8; 512]; 4]", "[u32; 4]", "[[u8; 32]; 4]",
  "Field",
  "[u8; 32]", "[u8; 32]",
]

assertions = [
  "Passport DSC signature verification failed",
  "CSCA signature over DSC TBS failed verification",
  "DSC modulus mismatch with CSCA-signed TBS",
  "CSCA Merkle root mismatch",
  "Revocation witness matches blocked serial",
  "Revocation SMT root mismatch",
  "Too many data groups",
  "Must have at least one data group",
  "DG length exceeds maximum",
  "Data group hash mismatch",
  "SOD combined hash mismatch",
  "Commitment X mismatch",
  "Commitment Y mismatch",
]

constants = { MAX_DG_COUNT = 4, MAX_DG_SIZE = 512, DSC_TBS_LEN = 1536, CSCA_MERKLE_DEPTH = 8, SMT_DEPTH = 32, CSCA_RSA_EXPONENT = 65537 }

min_positive_tests = 7   # v3.1 unit tests: DG chain + commitment + DSC extract + revocation
min_negative_tests = 4

exports = { out_commitment_x = "Field", out_commitment_y = "Field" }

[circuits.passport_adapter.dependencies]
noir_rsa = "v0.10.0"
bignum = "v0.9.2"
sha256 = "v0.3.0"
openac_core = "path"

# ============================================================
# Circuit: openac_show (v3 — Path A generic show with in-circuit ECDSA)
# ============================================================
[circuits.openac_show]
type = "bin"
description = "Generic OpenAC show (v3): in-circuit ECDSA-P256 device binding + v3 commitment re-open + challenge binding + predicates"
source = "circuits/openac_show/src/main.nr"
version = "v3"

public_inputs = [
  "nonce_hash",
  "link_mode", "link_scope", "epoch", "epoch_field",
  "current_year", "current_month", "current_day", "age_threshold",
  "disclose_nationality", "disclose_age",
  "out_commitment_x", "out_commitment_y",
  "out_challenge_digest", "out_link_tag",
  "out_is_older", "out_nationality",
]
public_input_types = [
  "[u8; 32]",
  "bool", "Field", "[u8; 4]", "Field",
  "u32", "u32", "u32", "u32",
  "bool", "bool",
  "Field", "Field",
  "[u8; 32]", "Field",
  "bool", "[u8; 3]",
]

# v3 adds `enclave_pk_x`, `enclave_pk_y`, `signature` as private witnesses so
# the circuit can run `verify_device_binding` in-circuit against `nonce_hash`.
# `pk_digest` derived from that ECDSA feeds into `commit_attributes_v3`.
# Note (2026-04-17 Path A): `Age not disclosed ... / Nationality not disclosed
# ...` assertions from v2 are intentionally removed — when a disclosure flag
# is false, the corresponding output is unconstrained to prevent leakage.
# `verify_show` (openac_core::show) handles hash + link-tag assertions.
private_inputs = [
  "credential_type", "attr_hash_hi", "attr_hash_lo", "link_rand",
  "enclave_pk_x", "enclave_pk_y", "signature",
  "challenge",
  "birth_year", "birth_month", "birth_day",
  "nationality",
]
private_input_types = [
  "Field", "Field", "Field", "Field",
  "[u8; 32]", "[u8; 32]", "[u8; 64]",
  "[u8; 32]",
  "u32", "u32", "u32",
  "[u8; 3]",
]

assertions = [
  "Commitment X mismatch",
  "Commitment Y mismatch",
  "Hash mismatch",
  "Scoped link tag mismatch",
  "Unlinkable mode requires zero scope",
  "Unlinkable mode requires zero tag",
  "Age predicate output mismatch",
  "Nationality output mismatch",
]

min_positive_tests = 4
min_negative_tests = 3

imports = { out_commitment_x = "passport_adapter", out_commitment_y = "passport_adapter" }

[circuits.openac_show.dependencies]
openac_core = "path"
sha256 = "v0.3.0"

# ============================================================
# Circuit: device_binding
# ============================================================
[circuits.device_binding]
type = "bin"
description = "ECDSA P-256 device binding: verifies Secure Enclave nonce signature"
source = "circuits/device_binding/src/main.nr"
version = "v2"

public_inputs = ["pub_key_x", "pub_key_y", "message_hash"]
public_input_types = ["[u8; 32]", "[u8; 32]", "[u8; 32]"]

private_inputs = ["signature"]
private_input_types = ["[u8; 64]"]

assertions = [
  "Device binding ECDSA P-256 verification failed",
]

min_positive_tests = 1
min_negative_tests = 1

# ============================================================
# Circuit: sdjwt_adapter (v3 — Path A SD-JWT prepare)
# ============================================================
[circuits.sdjwt_adapter]
type = "bin"
description = "OpenAC SD-JWT adapter (v3): ES256 issuer ECDSA + disclosure hash chain + Pedersen v3 commitment bound to enclave pk_digest"
source = "circuits/sdjwt_adapter/src/main.nr"
version = "v3"

public_inputs = ["issuer_pk_x", "issuer_pk_y", "out_commitment_x", "out_commitment_y"]
public_input_types = ["[u8; 32]", "[u8; 32]", "Field", "Field"]

# v3 adds `enclave_pk_x`, `enclave_pk_y` as private witnesses so the
# commitment binds `pk_digest`. The show phase re-derives pk_digest via
# in-circuit ECDSA against a fresh nonce.
private_inputs = [
  "jwt_payload_hash", "signature",
  "disclosure_count", "disclosure_salts", "claim_values", "claim_lengths", "expected_disclosure_hashes",
  "link_rand",
  "enclave_pk_x", "enclave_pk_y",
]
private_input_types = [
  "[u8; 32]", "[u8; 64]",
  "u8", "[[u8; 16]; 8]", "[[u8; 64]; 8]", "[u32; 8]", "[[u8; 32]; 8]",
  "Field",
  "[u8; 32]", "[u8; 32]",
]

assertions = [
  "SD-JWT ES256 signature verification failed",
  "Too many disclosures",
  "Claim length exceeds maximum",
  "SD-JWT disclosure hash mismatch",
  "Commitment X mismatch",
  "Commitment Y mismatch",
]

constants = { MAX_DISCLOSURES = 8, MAX_CLAIM_SIZE = 64, SALT_SIZE = 16 }

min_positive_tests = 5
min_negative_tests = 2

exports = { out_commitment_x = "Field", out_commitment_y = "Field" }

# ============================================================
# Circuit: jwt_x5c_adapter (v3.1 — Path A X.509 / OIDC RS256 prepare)
# ============================================================
[circuits.jwt_x5c_adapter]
type = "bin"
description = "X.509 x5c JWT prepare adapter (v3.1, RSA variant): RSA cert chain verification + Pedersen-SMT non-membership (depth 32) + RSA JWT signature + fixed-offset issuer claim extraction + Pedersen v3 commitment bound to enclave pk_digest"
source = "circuits/jwt_x5c_adapter/src/main.nr"
version = "v3.1"

# v3.1 (2026-04-17): 20,784 ACIR opcodes vs 65,000 target -- 94.6% reduction
# from v3.0's 384,147. Optimizations: SMT SHA256 -> pedersen_hash with
# DOMAIN_SMT_NODE, SMT_DEPTH 128 -> 32, JWT_PAYLOAD_LEN 4096 -> 1024,
# fixed-offset issuer claim extraction dispatched by `issuer_format_tag`.
# See spec/x509-benchmark.md sec. 3 / sec. 9 and spec/x509-migration.md sec. 9.
gate_budget = 65000
gate_budget_status = "within_budget"

public_inputs = [
  "jwt_payload_b64h", "jwt_signed_hash",
  "issuer_modulus",
  "smt_root",
  "issuer_format_tag",
  "out_commitment_x", "out_commitment_y",
]
public_input_types = [
  "[u8; 32]", "[u8; 32]",
  "[u128; 18]",
  "Field",
  "Field",
  "Field", "Field",
]

private_inputs = [
  "leaf_tbs", "issuer_tbs",
  "leaf_sig", "issuer_sig",
  "serial_number",
  "smt_siblings", "smt_old_key", "smt_old_value", "smt_is_old0",
  "jwt_payload_norm", "jwt_sig",
  "jwt_modulus_limbs", "jwt_redc_limbs", "issuer_redc_limbs",
  "link_rand_p",
  "enclave_pk_x", "enclave_pk_y",
]
private_input_types = [
  "[u8; 1536]", "[u8; 1536]",
  "[u128; 18]", "[u128; 18]",
  "[u8; 20]",
  "[Field; 32]", "Field", "Field", "bool",
  "[u8; 1024]", "[u128; 18]",
  "[u128; 18]", "[u128; 18]", "[u128; 18]",
  "Field",
  "[u8; 32]", "[u8; 32]",
]

assertions = [
  "Leaf certificate signature verification failed",
  "Issuer certificate signature verification failed",
  "Leaf cert JWT modulus mismatch",
  "Revocation witness matches blocked serial",
  "Revocation SMT root mismatch",
  "Unsupported issuer_format_tag (v1 only accepts GoogleOIDCv1 = 1)",
  "Normalized JWT domain missing value",
  "JWT payload hash mismatch",
  "JWT signature verification failed",
  "Commitment X mismatch",
  "Commitment Y mismatch",
]

constants = { CERT_TBS_LEN = 1536, JWT_PAYLOAD_LEN = 1024, LIMB_COUNT = 18, SMT_DEPTH = 32, RSA_EXPONENT = 65537, ISSUER_FORMAT_GOOGLE_OIDC_V1 = 1, ISSUER_FORMAT_APPLE_ID_V1 = 2, ISSUER_FORMAT_MICROSOFT_ENTRA_V1 = 3, GOOGLE_OIDC_V1_EMAIL_DOMAIN_OFFSET = 17, APPLE_ID_V1_EMAIL_DOMAIN_OFFSET = 16, MICROSOFT_ENTRA_V1_EMAIL_DOMAIN_OFFSET = 15 }

min_positive_tests = 7
min_negative_tests = 4

exports = { out_commitment_x = "Field", out_commitment_y = "Field" }

[circuits.jwt_x5c_adapter.dependencies]
noir_rsa = "v0.10.0"
bignum = "v0.9.2"
sha256 = "v0.3.0"
openac_core = "path"

# ============================================================
# Circuit: x509_show (v3 — Path A X.509 show)
# ============================================================
[circuits.x509_show]
type = "bin"
description = "X.509 show (v3): in-circuit ECDSA-P256 device binding + v3 commitment re-open + domain predicate + scoped link tag"
source = "circuits/x509_show/src/main.nr"
version = "v3"

gate_budget = 5000

public_inputs = [
  "in_commitment_x509_x", "in_commitment_x509_y",
  "nonce_hash",
  "target_domain_hash",
  "out_link_tag", "out_domain_match", "out_challenge_digest",
]
public_input_types = [
  "Field", "Field",
  "[u8; 32]",
  "Field",
  "Field", "Field", "Field",
]

private_inputs = [
  "attr_hi", "attr_lo", "link_rand_x",
  "enclave_pk_x", "enclave_pk_y", "signature",
  "scope", "epoch",
]
private_input_types = [
  "Field", "Field", "Field",
  "[u8; 32]", "[u8; 32]", "[u8; 64]",
  "Field", "Field",
]

assertions = [
  "Commitment X mismatch",
  "Commitment Y mismatch",
  "Domain match predicate mismatch",
  "Domain match must be boolean (0 or 1)",
  "Link tag mismatch",
  "Challenge digest mismatch",
]

min_positive_tests = 3
min_negative_tests = 2

imports = { in_commitment_x509_x = "jwt_x5c_adapter", in_commitment_x509_y = "jwt_x5c_adapter" }

[circuits.x509_show.dependencies]
openac_core = "path"

# ============================================================
# Circuit: composite_show (v3 — Path A passport + X.509 bundle show)
# ============================================================
[circuits.composite_show]
type = "bin"
description = "Composite show (v3): single ECDSA-P256 verify + re-open passport & X.509 commitments sharing the same pk_digest + age predicate + domain predicate + scoped link tag"
source = "circuits/composite_show/src/main.nr"
version = "v3"

gate_budget = 8000

public_inputs = [
  "in_commitment_passport_x", "in_commitment_passport_y",
  "in_commitment_x509_x", "in_commitment_x509_y",
  "nonce_hash",
  "age_threshold",
  "target_domain_hash",
  "out_link_tag", "out_is_older", "out_domain_match", "out_challenge_digest",
]
public_input_types = [
  "Field", "Field",
  "Field", "Field",
  "[u8; 32]",
  "Field",
  "Field",
  "Field", "Field", "Field", "Field",
]

private_inputs = [
  "p_attr_hi", "p_attr_lo", "link_rand_p",
  "x_attr_hi", "x_attr_lo",
  "enclave_pk_x", "enclave_pk_y", "signature",
  "scope", "epoch",
]
private_input_types = [
  "Field", "Field", "Field",
  "Field", "Field",
  "[u8; 32]", "[u8; 32]", "[u8; 64]",
  "Field", "Field",
]

assertions = [
  "Commitment X mismatch",
  "Commitment Y mismatch",
  "Age predicate mismatch",
  "out_is_older must be boolean (0 or 1)",
  "Domain match predicate mismatch",
  "out_domain_match must be boolean (0 or 1)",
  "Link tag mismatch",
  "Challenge digest mismatch",
]

min_positive_tests = 1
min_negative_tests = 3

imports = { in_commitment_passport_x = "passport_adapter", in_commitment_passport_y = "passport_adapter", in_commitment_x509_x = "jwt_x5c_adapter", in_commitment_x509_y = "jwt_x5c_adapter" }

[circuits.composite_show.dependencies]
openac_core = "path"

# ============================================================
# Cross-Circuit Hash Chain (v1 flow)
# ============================================================
[cross_circuit.v1_hash_chain]
description = "SHA256-based hash chain linking 5 v1 circuits"

[[cross_circuit.v1_hash_chain.links]]
from = "passport_verifier"
to = "data_integrity"
via = "sod_hash"
type = "[u8; 32]"

[[cross_circuit.v1_hash_chain.links]]
from = "data_integrity"
to = "disclosure"
via = "mrz_hash"
type = "[u8; 32]"

[[cross_circuit.v1_hash_chain.links]]
from = "passport_verifier"
to = "prepare_link"
via = "sod_hash"
type = "[u8; 32]"

[[cross_circuit.v1_hash_chain.links]]
from = "data_integrity"
to = "prepare_link"
via = "mrz_hash"
type = "[u8; 32]"

[[cross_circuit.v1_hash_chain.links]]
from = "prepare_link"
to = "show_link"
via = "out_prepare_commitment"
type = "[u8; 32]"

